{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>openlayers与geoserver交互</title>
  <!-- OpenLayers 核心库 -->
  <script src="{% static 'ol/ol.js' %}"></script>
  <script src="{% static 'jQuery-1.7.2.js' %}"></script>
  <style type="text/css">
    #map,
    html,
    body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
    }
  </style>
</head>

<body>
  <!-- 交互操作方式：查看/增加/修改/删除 -->
  <form class="form-inline">
    <label>操作方式 &nbsp;</label>
    <select id="interaction">
      <option value="search">查看</option>
      <option value="insert">增加</option>
      <option value="modify">修改</option>
      <option value="delete">删除</option>
    </select>
    <label>先操作对象，再点击 &nbsp;</label>
    <input type="button" id="creategml" name="name" value="提交" />
  </form>
  <div id="attributetable">
    <table>
      <thead>
        <tr>
          <th>fid</th>
          <th>name_py</th>
          <th>name_ch</th>
        </tr>
      </thead>
      <tbody id="attributetbody">
      </tbody>
    </table>
  </div>
  <!-- 地图容器 -->
  <div id="map"></div>
</body>
<script type="text/javascript">
  // === 坐标系配置 ===
  // OpenLayers 默认的 EPSG:4326 轴顺序是 [lat, lon]，需改为 [lon, lat] 以匹配 WMS 标准
  const proj4326 = ol.proj.get('EPSG:4326');
  console.log(proj4326.getAxisOrientation());
  // 重写 EPSG:4326 投影定义：强制轴顺序为 enu（东-北-上），对应 [lon, lat]
  const proj = new ol.proj.Projection({
    code: 'EPSG:4326',
    axisOrientation: 'enu',
    units: proj4326.getUnits(),
    canWrap: true,
    extent: proj4326.getExtent(),
    global: true,
    worldExtent: proj4326.getWorldExtent(),
  });
  ol.proj.addProjection(proj);

  // === 地图视图 ===
  const view = new ol.View({
    center: [116.400146, 40.250184],
    zoom: 9,
    projection: 'EPSG:4326',
  });
  // === 图层配置 ===
  // 底图：腾讯地图矢量瓦片
  // 叠加层：GeoServer 发布的 WMS 图层
  const layers = [
    new ol.layer.Tile({
      source: new ol.source.XYZ({
        url: "http://rt{0-3}.map.gtimg.com/realtimerender?z={z}&x={x}&y={-y}&type=vector&style=0"
      })
    }),
    new ol.layer.Image({
      source: new ol.source.ImageWMS({
        ratio: 1,
        url: 'http://localhost:8084/geoserver/wms?',
        params: {
          'SERVICE': 'WMS',
          'VERSION': '1.1.0',
          'REQUEST': 'GetMap',
          'FORMAT': 'image/png',
          'TRANSPARENT': true,
          'tiled': true,
          'LAYERS': 'mapgis:v6_time_pref_pgn_utf_wgs84_geoserver',//图层，前面是工作空间，后面是图层名，
          'exceptions': 'application/vnd.ogc.se_inimage',
          'singleTile': true//单瓦片，渲染成一张图片
        }

      })
    })
  ]
  // === 地图实例 ===
  const map = new ol.Map({
    target: 'map',
    layers: layers,
    view: view
  });
  // === 矢量图层（用于 WFS 增删改查） ===
  const source = new ol.source.Vector({ wrapX: false });
  const vector = new ol.layer.Vector({
    source: source,
    style: polygonStyleFunction
  });
  map.addLayer(vector);
  // === 交互工具 ===
  // 绘制、选择、修改，通过下拉菜单切换启用哪一个
  const draw = new ol.interaction.Draw({
    source: source,
    type: 'Polygon',
  });
  const select = new ol.interaction.Select({
    wrapX: false,
  });
  const modify = new ol.interaction.Modify({
    features: select.getFeatures(),
  });
  const typeInteraction = document.getElementById('interaction');
  // 下拉菜单切换时，移除所有交互再按需添加，避免冲突
  typeInteraction.onchange = function () {
    map.removeInteraction(draw);
    map.removeInteraction(select);
    map.removeInteraction(modify);
    if (typeInteraction.value == 'insert') {
      map.addInteraction(draw);
    }
    if (typeInteraction.value == 'modify') {
      map.addInteraction(select);
      map.addInteraction(modify);
    }
  };
  // 绘制完成后弹出属性输入框
  draw.once('drawend', function (e) {
    draw.setActive(false);
    const tabletxt = '<tr><td>'
      + '<input type="text" id="fid" value="fid" />' + '</td><td>'
      + '<input type="text" id="name_py" value="name_py" />' + '</td><td>'
      + '<input type="text" id="name_ch" value="name_ch" />' + '</td></tr>';
    $("#attributetbody").append(tabletxt);
  });
  // === WFS 事务提交 ===
  // 对应 GeoServer 的 WFS-T（事务）操作，支持 insert/update/delete
  $("#creategml").click(function () {
    if (typeInteraction.value == 'search') {
      alert('支持insert update delete')
    }
    // 获取feature列表
    const features = source.getFeatures();
    // 获取一个feature
    const feature = features[0];
    const fid = $("#fid").val();
    const name_py = $("#name_py").val();
    const name_ch = $("#name_ch").val();
    // update和delete的时候需要fid
    feature.setId(fid);
    feature.set('name_py', name_py);
    feature.set('name_ch', name_ch);
    // 创建WFS解析器 
    const WFSTSerializer = new ol.format.WFS();
    const insertFeatures = [];
    const updateFeatures = [];
    const deleteFeatures = [];
    if (typeInteraction.value == 'insert') {
      insertFeatures.push(feature);
    }
    if (typeInteraction.value == 'modify') {
      const updatefeature = select.getFeatures().getArray()[0];
      updatefeature.setId(fid);
      updatefeature.set('name_py', name_py);
      updatefeature.set('name_ch', name_ch);
      updateFeatures.push(updatefeature);
    }
    if (typeInteraction.value == 'delete') {
      deleteFeatures.push(feature);
    } // 格式：writeTransaction(inserts, updates, deletes, options)
    // updates和deletes都需要要素有唯一ID，进行索引
    // insert因为是新增，所以不需要
    const featObject = WFSTSerializer.writeTransaction(insertFeatures,
      updateFeatures, deleteFeatures, {
      featureNS: 'http://geoserver/mapgis',//工作区URI
      featurePrefix: 'mapgis',//工作区名称
      featureType: 'mapgis:v6_time_pref_pgn_utf_wgs84_geoserver',//图层名称
      // [注意] featureType 已含工作区前缀 mapgis:，与 featurePrefix 配合可能变为 mapgis:mapgis:xxx
      //       如果 WFS 提交报错，应改为只写图层名 'v6_time_pref_pgn_utf_wgs84_geoserver'
      srsName: 'EPSG:4326',//坐标系
    });
    const serializer = new XMLSerializer();
    const featString = serializer.serializeToString(featObject);
    // 打印到控制台看看效果，openlayer默认生成的GML中几何字段名为geometry
    console.log(featString);
    // 清空属性表
    $("#attributetable").html('<table><thead><tr><th>fid</th><th>name_py</th><th>name_ch</th></tr></thead><tbody id="attributetbody"></tbody></table>');
    // 上传到 geoserver（通过 Django 后端代理 /wfs/，绕过 CORS）
    // [注意] dataType: 'text' 是因为 WFS 返回的是 XML，设为 'json' 会解析失败
    function getCSRFToken() {
      return document.cookie.split('; ')
        .find(row => row.startsWith('csrftoken='))
        ?.split('=')[1];
    }

    $.ajax({
      type: 'POST',
      url: '/wfs/',
      contentType: 'text/xml',
      data: featString,
      dataType: 'text',
      headers: { "X-CSRFToken": getCSRFToken() },
      success: function (data) {
        source.removeFeature(feature);
        console.log(data);
      },
      error: function (data) {
        source.removeFeature(feature);
        console.log(data);
        alert('上传失败');
      }
    });
  });
  // === 地图点击查询（GetFeatureInfo） ===
  // 通过 Django 后端 /getfeature/ 转发到 GeoServer，避免 CORS 问题
  $("#map").click(function (e) {
    if (typeInteraction.value == 'insert') {
      return;
    };
    if (typeInteraction.value == 'modify') {
      return;
    };
    if (typeInteraction.value == 'delete') {
      return;
    };

    const t4326 = map.getEventCoordinate(e);
    // 请求 Django 后端的 /getfeature/ 接口（内部转发到 GeoServer 的 GetFeatureInfo WMS 请求）
    // BBOX 以点击位置为中心向外扩展 0.0001 度，作为查询范围
    const url4326 = '/getfeature?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetFeatureInfo&FORMAT=image%2Fpng&TRANSPARENT=true&QUERY_LAYERS=gismap%3Av6_time_pref_pgn_utf_wgs84_geoserver&LAYERS=gismap%3Av6_time_pref_pgn_utf_wgs84_geoserver&exceptions=application%2Fvnd.ogc.se_inimage&INFO_FORMAT=application/json&FEATURE_COUNT=50&X=50&Y=50&SRS=EPSG%3A4326&STYLES=&WIDTH=101&HEIGHT=101&BBOX=' + (t4326[0] - 0.0001).toString() + '%2C' + (t4326[1] - 0.0001).toString() + '%2C' + (t4326[0] + 0.0001).toString() + '%2C' + (t4326[1] + 0.0001).toString();
    $.ajax(
      {
        url: url4326,
        type: 'GET',
        dataType: 'json',
        success: function (data) {
          //这个方法直接把geojson转为feature数组
          // [注意] features 未用 let/const 声明，会创建全局变量，容易引发命名冲突
          const features = (new ol.format.GeoJSON()).readFeatures(data);
          // 将feature数组中第一个feature放到source中
          source.addFeature(features[0]);
          //更新属性表
          const fid = data['features'][0]['id'];
          const properties = data['features'][0]['properties'];
          const name_py = properties['name_py'];
          const name_ch = properties['name_ch'];
          const tabletxt = '<tr><td>'
            + '<input type="text" id="fid" value="' + fid + '" />' + '</td><td>'
            + '<input type="text" id="name_py" value="' + name_py + '" />' + '</td><td>'
            + '<input type="text" id="name_ch" value="' + name_ch + '" />' + '</td></tr>';
          $("#attributetbody").append(tabletxt);
        },
        error: function (data) {
          console.log('faile');
          console.log(data);
        }
      }
    );
  });
  // === 制图风格 ===
  // 因为每个要素的 name_ch 属性不同，所以用函数动态生成样式，而非静态对象
  function polygonStyleFunction(feature) {
    return new ol.style.Style({
      stroke: new ol.style.Stroke({
        color: 'rgba(192, 0, 0, 1)',
        width: 2
      }),
      fill: new ol.style.Fill({
        color: 'rgba(192, 192, 192, 0.5)'
      }),
      text: createTextStyle(feature)
    });
  };
  // === 注记样式 ===
  function createTextStyle(feature) {
    return new ol.style.Text({
      font: '20px Microsoft YaHei',
      text: getText(feature),
      fill: new ol.style.Fill({
        color: 'rgba(192, 0, 0, 1)'
      }),
      stroke: new ol.style.Stroke({ color: 'rgba(255, 255, 255, 1)', width: 1 }),
    })
  };
  // 从要素属性获取注记文本，没有 name_ch 时显示默认值 'tool'
  function getText(feature) {
    if (feature.get('name_ch')) {
      return feature.get('name_ch').toString();
    } else {
      return 'tool';
    }
  };

</script>
<style type="text/css">
  #map {
    width: 100%;
    height: 100%;
  }

  #attributetable {
    width: 100%;
    height: 5%;
    margin: 10px;
  }

  table {
    border-collapse: collapse;
    border-spacing: 0;
    border: 1px solid #c0c0c0;
  }

  th,
  td {
    border: 1px solid #d0d0d0;
    color: #404060;
    padding: 10px;
  }

  th {
    background-color: #C00000;
    font: bold 16px "微软雅黑";
    color: #fff;
  }

  td {
    font: 14px "微软雅黑";
  }

  tbody tr {
    background-color: #f0f0f0;
  }

  tbody tr:hover {
    cursor: pointer;
    background-color: #fafafa;
  }
</style>

</html>
