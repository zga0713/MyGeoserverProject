{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>openlayers与geoserver交互</title>
  <link rel="stylesheet" href="{% static 'ol/ol.css' %}">
  <link rel="stylesheet" href="{% static 'ol/datav-style.css' %}">
  <link rel="icon" href="{% static 'favicon.ico' %}">
  <script src="{% static 'ol/ol.js' %}"></script>
  <script src="{% static 'jQuery-1.7.2.js' %}"></script>
  <style type="text/css">
    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div class="datav-layout">
    <nav class="datav-navbar">
      <span class="datav-navbar-title">WebGIS 要素编辑器</span>
      <span class="datav-navbar-subtitle">OpenLayers + GeoServer</span>
    </nav>

    <div class="datav-main">
      <div class="datav-map-area">
        <div id="map"></div>
      </div>

      <aside class="datav-panel">
        <div class="datav-card">
          <div class="datav-card-title">操作控制</div>
          <div class="datav-card-body">
            <form id="operationForm">
              <div class="datav-form-group">
                <label class="datav-form-label" for="interaction">操作方式</label>
                <select id="interaction" class="datav-select">
                  <option value="search">查看</option>
                  <option value="insert">增加</option>
                  <option value="modify">修改</option>
                  <option value="delete">删除</option>
                </select>
              </div>
              <div class="datav-form-group">
                <button type="button" id="creategml" name="name" class="datav-btn datav-btn-block">提交</button>
              </div>
            </form>
            <div class="datav-info-bar">
              先操作对象，再点击提交
            </div>
          </div>
        </div>

        <div class="datav-card">
          <div class="datav-card-title">属性表</div>
          <div id="attributetable">
            <table class="datav-table">
              <thead>
                <tr>
                  <th>fid</th>
                  <th>name_py</th>
                  <th>name_ch</th>
                </tr>
              </thead>
              <tbody id="attributetbody">
              </tbody>
            </table>
          </div>
        </div>
      </aside>
    </div>

    <footer class="datav-footer">
      数据来源：GeoServer WFS-T 服务 · 底图：腾讯地图
    </footer>
  </div>
</body>
<script type="text/javascript">
  const baseurl = 'http://localhost:8084/';
  const proj4326 = ol.proj.get('EPSG:4326');
  const proj = new ol.proj.Projection({
    code: 'EPSG:4326',
    axisOrientation: 'enu',
    units: proj4326.getUnits(),
    canWrapX: true,
    extent: proj4326.getExtent(),
    global: true,
    worldExtent: proj4326.getWorldExtent(),
  });
  ol.proj.addProjection(proj);

  const view = new ol.View({
    center: [116.400146, 40.250184],
    zoom: 9,
    projection: 'EPSG:4326',
  });

  const layers = [
    new ol.layer.Tile({
      source: new ol.source.XYZ({
        url: "http://rt{0-3}.map.gtimg.com/realtimerender?z={z}&x={x}&y={-y}&type=vector&style=0"
      })
    }),
    new ol.layer.Image({
      source: new ol.source.ImageWMS({
        ratio: 1,
        url: 'http://localhost:8084/geoserver/wms?',
        params: {
          'SERVICE': 'WMS',
          'VERSION': '1.1.0',
          'REQUEST': 'GetMap',
          'FORMAT': 'image/png',
          'TRANSPARENT': true,
          'tiled': true,
          'LAYERS': 'mapgis:v6_time_pref_pgn_utf_wgs84_geoserver',
          'exceptions': 'application/vnd.ogc.se_inimage',
          'singleTile': true
        }
      })
    })
  ]

  const map = new ol.Map({
    target: 'map',
    layers: layers,
    view: view
  });

  const source = new ol.source.Vector({ wrapX: false });
  const vector = new ol.layer.Vector({
    source: source,
    style: polygonStyleFunction
  });
  map.addLayer(vector);

  const draw = new ol.interaction.Draw({
    source: source,
    type: 'Polygon',
  });
  const select = new ol.interaction.Select({
    wrapX: false,
  });
  const modify = new ol.interaction.Modify({
    features: select.getFeatures(),
  });

  const typeInteraction = document.getElementById('interaction');
  typeInteraction.onchange = function () {
    map.removeInteraction(draw);
    map.removeInteraction(select);
    map.removeInteraction(modify);
    if (typeInteraction.value == 'insert') {
      map.addInteraction(draw);
    }
    if (typeInteraction.value == 'modify') {
      map.addInteraction(select);
      map.addInteraction(modify);
    }
  };

  draw.once('drawend', function (e) {
    draw.setActive(false);
    const tabletxt = '<tr><td>'
      + '<input type="text" id="fid" value="fid" />' + '</td><td>'
      + '<input type="text" id="name_py" value="name_py" />' + '</td><td>'
      + '<input type="text" id="name_ch" value="name_ch" />' + '</td></tr>';
    $("#attributetbody").append(tabletxt);
  });

  function getCSRFToken() {
    return document.cookie.split('; ')
      .find(row => row.startsWith('csrftoken='))
      ?.split('=')[1];
  }

  $("#creategml").click(function () {
    if (typeInteraction.value == 'search') {
      alert('支持insert update delete')
    }
    const features = source.getFeatures();
    const feature = features[0];
    const fid = $("#fid").val();
    const name_py = $("#name_py").val();
    const name_ch = $("#name_ch").val();
    feature.setId(fid);
    feature.set('name_py', name_py);
    feature.set('name_ch', name_ch);

    const WFSTSerializer = new ol.format.WFS();
    const insertFeatures = [];
    const updateFeatures = [];
    const deleteFeatures = [];
    if (typeInteraction.value == 'insert') {
      insertFeatures.push(feature);
    }
    if (typeInteraction.value == 'modify') {
      const updatefeature = select.getFeatures().getArray()[0];
      updatefeature.setId(fid);
      updatefeature.set('name_py', name_py);
      updatefeature.set('name_ch', name_ch);
      updateFeatures.push(updatefeature);
    }
    if (typeInteraction.value == 'delete') {
      deleteFeatures.push(feature);
    }

    const featObject = WFSTSerializer.writeTransaction(insertFeatures,
      updateFeatures, deleteFeatures, {
      featureNS: 'http://geoserver/mapgis',
      featurePrefix: 'mapgis',
      featureType: 'mapgis:v6_time_pref_pgn_utf_wgs84_geoserver',
      srsName: 'EPSG:4326',
    });
    const serializer = new XMLSerializer();
    const featString = serializer.serializeToString(featObject);
    console.log(featString);

    $("#attributetable").html('<table><thead><tr><th>fid</th><th>name_py</th><th>name_ch</th></tr></thead><tbody id="attributetbody"></tbody></table>');

    $.ajax({
      type: 'POST',
      url: '/wfs/',
      contentType: 'text/xml',
      data: featString,
      dataType: 'text',
      headers: { "X-CSRFToken": getCSRFToken() },
      success: function (data) {
        source.removeFeature(feature);
        console.log(data);
      },
      error: function (data) {
        source.removeFeature(feature);
        console.log(data);
        alert('上传失败');
      }
    });
  });

  $("#map").click(function (e) {
    if (typeInteraction.value == 'insert') {
      return;
    };
    if (typeInteraction.value == 'modify') {
      return;
    };
    if (typeInteraction.value == 'delete') {
      return;
    };

    const t4326 = map.getEventCoordinate(e);
    const url4326 = '/getfeature?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetFeatureInfo&FORMAT=image%2Fpng&TRANSPARENT=true&QUERY_LAYERS=mapgis%3Av6_time_pref_pgn_utf_wgs84_geoserver&LAYERS=mapgis%3Av6_time_pref_pgn_utf_wgs84_geoserver&exceptions=application%2Fvnd.ogc.se_inimage&INFO_FORMAT=application/json&FEATURE_COUNT=50&X=50&Y=50&SRS=EPSG%3A4326&STYLES=&WIDTH=101&HEIGHT=101&BBOX=' + (t4326[0] - 0.0001).toString() + '%2C' + (t4326[1] - 0.0001).toString() + '%2C' + (t4326[0] + 0.0001).toString() + '%2C' + (t4326[1] + 0.0001).toString();
    $.ajax(
      {
        url: url4326,
        type: 'GET',
        dataType: 'json',
        success: function (data) {
          if (!data['features'] || data['features'].length === 0) {
            alert('该位置没有查询到要素');
            return;
          }
          source.clear();
          const features = (new ol.format.GeoJSON()).readFeatures(data);
          source.addFeature(features[0]);
          $("#attributetbody").empty();
          const fid = data['features'][0]['id'];
          const properties = data['features'][0]['properties'];
          const name_py = properties['name_py'] || '';
          const name_ch = properties['name_ch'] || '';
          const tabletxt = '<tr><td>'
            + '<input type="text" class="edit-fid" value="' + fid + '" readonly />' + '</td><td>'
            + '<input type="text" class="edit-name_py" value="' + name_py + '" />' + '</td><td>'
            + '<input type="text" class="edit-name_ch" value="' + name_ch + '" />' + '</td></tr>';
          $("#attributetbody").append(tabletxt);
        },
        error: function (data) {
          console.log('查询失败');
          console.log(data);
          alert('查询要素失败，请查看控制台信息');
        }
      }
    );
  });

  function polygonStyleFunction(feature) {
    return new ol.style.Style({
      stroke: new ol.style.Stroke({
        color: 'rgba(22, 119, 255, 0.8)',
        width: 2
      }),
      fill: new ol.style.Fill({
        color: 'rgba(22, 119, 255, 0.15)'
      }),
      text: createTextStyle(feature)
    });
  };

  function createTextStyle(feature) {
    return new ol.style.Text({
      font: '14px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
      text: getText(feature),
      fill: new ol.style.Fill({
        color: 'rgba(22, 119, 255, 1)'
      }),
      stroke: new ol.style.Stroke({ color: 'rgba(255, 255, 255, 1)', width: 1 }),
    })
  };

  function getText(feature) {
    if (feature.get('name_ch')) {
      return feature.get('name_ch').toString();
    } else {
      return 'tool';
    }
  };
</script>

</html>
