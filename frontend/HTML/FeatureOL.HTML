<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>openlayers渲染矢量要素</title>
  <link rel="stylesheet" href="ol/ol.css">
  <link rel="stylesheet" href="ol/datav-style.css">
  <script src="ol/ol.js"></script>
  <script src="jQuery-1.7.2.js"></script>
  <style type="text/css">
    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div class="datav-layout">
    <nav class="datav-navbar">
      <span class="datav-navbar-title">矢量要素渲染</span>
      <span class="datav-navbar-subtitle">点 / 线 / 面 示例</span>
    </nav>

    <div class="datav-main" style="flex: 1;">
      <div class="datav-map-area" style="flex: 1 1 100%;">
        <div id="map"></div>
      </div>
    </div>

    <footer class="datav-footer">
      数据来源：OpenLayers 矢量要素 · 底图：高德地图
    </footer>
  </div>

  <script type="text/javascript">
    const view = new ol.View({
      center: ol.proj.transform([116.400146, 40.250184], 'EPSG:4326', 'EPSG:3857'),
      zoom: 9
    });

    const layers = [
      new ol.layer.Tile({
        source: new ol.source.XYZ({
          url: 'https://webrd0{1-4}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',
        })
      })
    ];

    const map = new ol.Map({
      target: 'map',
      view: view,
      layers: layers
    });

    const style = new ol.style.Style({
      image: new ol.style.Circle({
        fill: new ol.style.Fill({
          color: 'rgba(22, 119, 255, 0.15)'
        }),
        stroke: new ol.style.Stroke({
          color: 'rgba(22, 119, 255, 0.8)',
          width: 2
        }),
        radius: 10,
      }),
      stroke: new ol.style.Stroke({
        color: 'rgba(22, 119, 255, 0.8)',
        width: 2
      }),
      fill: new ol.style.Fill({
        color: 'rgba(22, 119, 255, 0.15)'
      }),
      text: new ol.style.Text({
        text: '测试注记',
        font: '14px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
        offsetY: 20,
        offsetX: 20,
        fill: new ol.style.Fill({
          color: 'rgba(22, 119, 255, 1)'
        }),
        stroke: new ol.style.Stroke({
          color: 'rgba(255, 255, 255, 1)',
          width: 1
        }),
      })
    });

    const point = new ol.Feature(
      new ol.geom.Point(
        ol.proj.transform([116.400146, 40.250184], 'EPSG:4326', 'EPSG:3857')
      )
    );

    const line = new ol.Feature(
      new ol.geom.LineString([
        ol.proj.transform([116.400146, 40.250184], 'EPSG:4326', 'EPSG:3857'),
        ol.proj.transform([117.400146, 41.250184], 'EPSG:4326', 'EPSG:3857')
      ])
    );

    const polygon = new ol.Feature(
      new ol.geom.Polygon([[
        ol.proj.transform([116.400146, 40.250184], 'EPSG:4326', 'EPSG:3857'),
        ol.proj.transform([116.400146, 41.250184], 'EPSG:4326', 'EPSG:3857'),
        ol.proj.transform([117.400146, 41.250184], 'EPSG:4326', 'EPSG:3857'),
        ol.proj.transform([116.400146, 40.250184], 'EPSG:4326', 'EPSG:3857')
      ]])
    );

    const vectorSource = new ol.source.Vector({
      features: [point, line, polygon]
    });

    const vectorLayer = new ol.layer.Vector({
      source: vectorSource,
      style: style
    });

    map.addLayer(vectorLayer);
  </script>

</body>

</html>
