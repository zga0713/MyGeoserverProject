<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>openlayer修改要素</title>
  <link href="ol/ol.css" rel="stylesheet" />
  <script src="ol/ol.js"></script>
  <style type="text/css">
    * {
      margin: 0;
      padding: 0;
    }

    #map,
    html,
    body {
      height: 100%;
      width: 100%;
    }

    form.form-inline {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      padding: 12px 16px;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      font-family: "Microsoft YaHei", sans-serif;
      font-size: 14px;
    }

    form.form-inline select {
      margin-left: 8px;
      padding: 4px 8px;
      font-size: 14px;
      border: 1px solid #c0c0c0;
      border-radius: 3px;
    }

    form.form-inline label {
      margin-right: 4px;
    }

    form.form-inline label+label {
      margin-left: 12px;
    }
  </style>
</head>

<body>
  <div id="map"></div>
  <form class="form-inline">
    <label>操作方式</label>
    <select id="interaction">
      <option value="draw">绘制</option>
      <option value="modify">修改</option>
      <option value="select">选择</option>
    </select>
    <label>几何类型</label>
    <select id="geometryType">
      <option value="None">无</option>
      <option value="Point">点</option>
      <option value="LineString">线</option>
      <option value="Polygon">面</option>
      <option value="Circle">圆</option>
    </select>
  </form>
  <script>
    const layers = [
      new ol.layer.Tile({
        source: new ol.source.XYZ({
          url: 'https://rt{0-3}.map.gtimg.com/realtimerender?z={z}&x={x}&y={-y}&type=vector&style=0',
        })
      })
    ];
    const source = new ol.source.Vector({ wrapX: false });
    const vectorLayer = new ol.layer.Vector({
      source: source,
    });
    const view = new ol.View({
      center: ol.proj.transform([116.400146, 40.250184], 'EPSG:4326', 'EPSG:3857'),
      zoom: 9,
    });
    const map = new ol.Map({
      target: 'map',
      layers: layers,
      view: view,
    });
    map.addLayer(vectorLayer);

    const typeSelect = document.getElementById('geometryType');
    const typeInteraction = document.getElementById('interaction');

    let draw = null;
    let snap = null;

    const select = new ol.interaction.Select({
      wrapX: false,
    });
    const modify = new ol.interaction.Modify({
      features: select.getFeatures(),
    });

    function addInteraction() {
      const mode = typeInteraction.value;
      const geomType = typeSelect.value;

      if (mode === 'draw' && geomType !== 'None') {
        draw = new ol.interaction.Draw({
          source: source,
          type: geomType,
        });
        map.addInteraction(draw);
        snap = new ol.interaction.Snap({
          source: source,
        });
        map.addInteraction(snap);
      } else if (mode === 'modify') {
        if (!map.getInteractions().getArray().includes(select)) {
          map.addInteraction(select);
        }
        if (!map.getInteractions().getArray().includes(modify)) {
          map.addInteraction(modify);
        }
        if (snap && !map.getInteractions().getArray().includes(snap)) {
          map.addInteraction(snap);
        }
      } else if (mode === 'select') {
        if (!map.getInteractions().getArray().includes(select)) {
          map.addInteraction(select);
        }
      }
    }

    function removeAllAndAdd() {
      if (draw) map.removeInteraction(draw);
      if (snap) map.removeInteraction(snap);
      map.removeInteraction(select);
      map.removeInteraction(modify);
      addInteraction();
    }

    typeSelect.onchange = removeAllAndAdd;
    typeInteraction.onchange = removeAllAndAdd;
    addInteraction();
  </script>
</body>

</html>
