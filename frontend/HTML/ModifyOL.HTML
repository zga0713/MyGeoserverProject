<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>openlayer修改要素</title>
  <link href="ol/ol.css" rel="stylesheet" />
  <link href="ol/datav-style.css" rel="stylesheet" />
  <script src="ol/ol.js"></script>
  <style type="text/css">
    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div class="datav-layout">
    <nav class="datav-navbar">
      <span class="datav-navbar-title">要素编辑</span>
      <span class="datav-navbar-subtitle">绘制 / 修改 / 选择</span>
    </nav>

    <div class="datav-main">
      <div class="datav-map-area">
        <div id="map"></div>
        <div class="datav-map-overlay">
          <label class="datav-form-label" for="interaction" style="margin-bottom:0;white-space:nowrap;">操作方式</label>
          <select id="interaction" class="datav-select" style="width:auto;">
            <option value="draw">绘制</option>
            <option value="modify">修改</option>
            <option value="select">选择</option>
          </select>
          <label class="datav-form-label" for="geometryType" style="margin-bottom:0;white-space:nowrap;">几何类型</label>
          <select id="geometryType" class="datav-select" style="width:auto;">
            <option value="None">无</option>
            <option value="Point">点</option>
            <option value="LineString">线</option>
            <option value="Polygon">面</option>
            <option value="Circle">圆</option>
          </select>
        </div>
      </div>

      <aside class="datav-panel">
        <div class="datav-card">
          <div class="datav-card-title">操作说明</div>
          <div class="datav-card-body">
            <p style="margin-bottom:8px;">选择操作方式和几何类型后，在地图上进行操作：</p>
            <p style="color:var(--text-helper);font-size:12px;margin-bottom:4px;">绘制 — 在地图上单击绘制几何要素</p>
            <p style="color:var(--text-helper);font-size:12px;margin-bottom:4px;">修改 — 拖拽要素顶点进行编辑</p>
            <p style="color:var(--text-helper);font-size:12px;">选择 — 点击要素进行选中</p>
          </div>
        </div>
      </aside>
    </div>

    <footer class="datav-footer">
      数据来源：OpenLayers 交互编辑 · 底图：高德地图
    </footer>
  </div>

  <script>
    const layers = [
      new ol.layer.Tile({
        source: new ol.source.XYZ({
          url: 'https://webrd0{1-4}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',
        })
      })
    ];
    const source = new ol.source.Vector({ wrapX: false });
    const vectorLayer = new ol.layer.Vector({
      source: source,
    });
    const view = new ol.View({
      center: ol.proj.transform([116.400146, 40.250184], 'EPSG:4326', 'EPSG:3857'),
      zoom: 9,
    });
    const map = new ol.Map({
      target: 'map',
      layers: layers,
      view: view,
    });
    map.addLayer(vectorLayer);

    const typeSelect = document.getElementById('geometryType');
    const typeInteraction = document.getElementById('interaction');

    let draw = null;
    let snap = null;

    const select = new ol.interaction.Select({
      wrapX: false,
    });
    const modify = new ol.interaction.Modify({
      features: select.getFeatures(),
    });

    function addInteraction() {
      const mode = typeInteraction.value;
      const geomType = typeSelect.value;

      if (mode === 'draw' && geomType !== 'None') {
        draw = new ol.interaction.Draw({
          source: source,
          type: geomType,
        });
        map.addInteraction(draw);
        snap = new ol.interaction.Snap({
          source: source,
        });
        map.addInteraction(snap);
      } else if (mode === 'modify') {
        if (!map.getInteractions().getArray().includes(select)) {
          map.addInteraction(select);
        }
        if (!map.getInteractions().getArray().includes(modify)) {
          map.addInteraction(modify);
        }
        if (snap && !map.getInteractions().getArray().includes(snap)) {
          map.addInteraction(snap);
        }
      } else if (mode === 'select') {
        if (!map.getInteractions().getArray().includes(select)) {
          map.addInteraction(select);
        }
      }
    }

    function removeAllAndAdd() {
      if (draw) map.removeInteraction(draw);
      if (snap) map.removeInteraction(snap);
      map.removeInteraction(select);
      map.removeInteraction(modify);
      addInteraction();
    }

    typeSelect.onchange = removeAllAndAdd;
    typeInteraction.onchange = removeAllAndAdd;
    addInteraction();
  </script>
</body>

</html>
