<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>瓦片地图展示</title>
  <link rel="stylesheet" href="ol/ol.css">
  <link rel="stylesheet" href="ol/datav-style.css">
  <script src="ol/ol.js"></script>
  <script src="jQuery-1.7.2.js"></script>
  <style type="text/css">
    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div class="datav-layout">
    <nav class="datav-navbar">
      <span class="datav-navbar-title">瓦片地图</span>
      <span class="datav-navbar-subtitle">GeoServer WMS + 高德底图</span>
    </nav>

    <div class="datav-main" style="flex: 1;">
      <div class="datav-map-area" style="flex: 1 1 100%;">
        <div id="map"></div>
      </div>
    </div>

    <footer class="datav-footer">
      数据来源：GeoServer WMS 服务 · 底图：高德地图
    </footer>
  </div>

  <script type="text/javascript">
    const view = new ol.View({
      center: ol.proj.transform([116.400146, 40.250184], 'EPSG:4326', 'EPSG:3857'),
      zoom: 9
    });

    const layers = [
      new ol.layer.Tile({
        source: new ol.source.XYZ({
          url: "https://webrd0{1-4}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}"
        })
      }),
      new ol.layer.Image({
        source: new ol.source.ImageWMS({
          url: "http://localhost:8084/geoserver/mapgis/wms?",
          params: {
            'SERVICE': 'WMS',
            'VERSION': '1.1.0',
            'REQUEST': 'GetMap',
            'FORMAT': 'image/png',
            'TRANSPARENT': 'true',
            'tiled': 'true',
            'LAYERS': 'mapgis:v6_time_cnty_pts_utf_wgs84',
            'exceptions': 'application/vnd.ogc.se_inimage'
          },
          serverType: 'geoserver'
        })
      }),
    ];

    const map = new ol.Map({
      target: 'map',
      layers: layers,
      view: view
    });
  </script>

</body>

</html>
