<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>openlayer矢量要素渲染查询</title>
  <link rel="stylesheet" href="ol/ol.css">
  <link rel="stylesheet" href="ol/datav-style.css">
  <script src="ol/ol.js"></script>
  <script src="jquery-1.7.2.js"></script>
  <style type="text/css">
    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div class="datav-layout">
    <nav class="datav-navbar">
      <span class="datav-navbar-title">矢量要素查询</span>
      <span class="datav-navbar-subtitle">WMS GetFeatureInfo</span>
    </nav>

    <div class="datav-main">
      <div class="datav-map-area">
        <div id="map"></div>
      </div>

      <aside class="datav-panel">
        <div class="datav-card">
          <div class="datav-card-title">查询结果</div>
          <div id="attributetable">
            <table class="datav-table">
              <thead>
                <tr>
                  <th>name_py</th>
                  <th>name_ch</th>
                </tr>
              </thead>
              <tbody id="attributetbody">
              </tbody>
            </table>
          </div>
        </div>
      </aside>
    </div>

    <footer class="datav-footer">
      数据来源：GeoServer WMS 服务 · 底图：高德地图
    </footer>
  </div>
</body>

<script type="text/javascript">
  const baseurl = 'http://localhost:8084/';

  const view = new ol.View({
    center: ol.proj.transform([116.400146, 40.250184], 'EPSG:4326', 'EPSG:3857'),
    zoom: 9
  });

  const layers = [
    new ol.layer.Tile({
      source: new ol.source.XYZ({
        url: "https://webrd0{1-4}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}"
      })
    }),
    new ol.layer.Image({
      source: new ol.source.ImageWMS({
        ratio: 1,
        url: 'http://localhost:8084/geoserver/wms?',
        params: {
          'SERVICE': 'WMS',
          'VERSION': '1.1.0',
          'REQUEST': 'GetMap',
          'FORMAT': 'image/png',
          'TRANSPARENT': true,
          'tiled': true,
          'LAYERS': 'mapgis:v6_time_pref_pgn_utf_wgs84_geoserver',
          'exceptions': 'application/vnd.ogc.se_inimage',
          'singleTile': true
        }
      }),
    }),
  ];

  const map = new ol.Map({
    target: 'map',
    layers: layers,
    view: view
  });

  let resultVectorLayer = null;

  $("#map").click(function (e) {
    const t3857 = map.getEventCoordinate(e);
    console.log('3857坐标:', t3857);
    const t4326 = ol.proj.transform(t3857, 'EPSG:3857', 'EPSG:4326');
    console.log('4326坐标:', t4326);

    const bboxSize = 100;
    const width = 101;
    const height = 101;

    const url3857 = baseurl
      + 'geoserver/wms?'
      + 'SERVICE=WMS'
      + '&VERSION=1.1.1'
      + '&REQUEST=GetFeatureInfo'
      + '&FORMAT=image%2Fpng'
      + '&TRANSPARENT=true'
      + '&QUERY_LAYERS=mapgis%3Av6_time_pref_pgn_utf_wgs84_geoserver'
      + '&LAYERS=mapgis%3Av6_time_pref_pgn_utf_wgs84_geoserver'
      + '&exceptions=application%2Fvnd.ogc.se_inimage'
      + '&INFO_FORMAT=application/json'
      + '&FEATURE_COUNT=50'
      + '&X=50&Y=50'
      + '&SRS=EPSG%3A3857'
      + '&STYLES='
      + '&WIDTH=' + width.toString() + '&HEIGHT=' + height.toString()
      + '&BBOX='
      + (t3857[0] - bboxSize).toString() + '%2C'
      + (t3857[1] - bboxSize).toString() + '%2C'
      + (t3857[0] + bboxSize).toString() + '%2C'
      + (t3857[1] + bboxSize).toString();
    console.log('WMS请求URL:', url3857);

    $.ajax(
      {
        url: url3857,
        type: 'GET',
        dataType: 'json',
        success: function (data) {
          if (!data['features'] || data['features'].length === 0) {
            alert('该位置没有查询到要素');
            return;
          }

          if (resultVectorLayer) {
            map.removeLayer(resultVectorLayer);
          }

          const features = (new ol.format.GeoJSON()).readFeatures(data);

          const vectorSource = new ol.source.Vector({
            features: features
          });

          resultVectorLayer = new ol.layer.Vector({
            source: vectorSource,
            style: polygonStyleFunction
          });

          map.addLayer(resultVectorLayer);

          $("#attributetbody").empty();
          for (let i = 0; i < data['features'].length; i++) {
            const properties = data['features'][i]['properties'];
            const name_py = properties['name_py'] || '';
            const name_ch = properties['name_ch'] || '';
            const tabletxt = '<tr><td>'
              + name_py + '</td><td>'
              + name_ch + '</td></tr>';
            $("#attributetbody").append(tabletxt);
          }
        },
        error: function (data) {
          console.log('请求失败');
          console.log(data);
          alert('查询要素失败，请确认GeoServer服务是否正常运行');
        }
      }
    );
  });

  function polygonStyleFunction(feature) {
    return new ol.style.Style({
      stroke: new ol.style.Stroke({
        color: 'rgba(22, 119, 255, 0.8)',
        width: 2
      }),
      fill: new ol.style.Fill({
        color: 'rgba(22, 119, 255, 0.15)'
      }),
      text: createTextStyle(feature)
    });
  };

  function createTextStyle(feature) {
    return new ol.style.Text({
      font: '14px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
      text: getText(feature),
      fill: new ol.style.Fill({
        color: 'rgba(22, 119, 255, 1)'
      }),
      stroke: new ol.style.Stroke({
        color: 'rgba(255, 255, 255, 1)',
        width: 1
      }),
    })
  };

  function getText(feature) {
    return feature.get('name_ch').toString();
  };
</script>

</html>
