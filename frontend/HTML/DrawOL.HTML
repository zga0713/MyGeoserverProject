<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>openlayer绘制要素</title>
  <link href="ol/ol.css" rel="stylesheet" />
  <link href="ol/datav-style.css" rel="stylesheet" />
  <script src="ol/ol.js"></script>
  <style type="text/css">
    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div class="datav-layout">
    <nav class="datav-navbar">
      <span class="datav-navbar-title">要素绘制</span>
      <span class="datav-navbar-subtitle">OpenLayers Draw</span>
    </nav>

    <div class="datav-main">
      <div class="datav-map-area">
        <div id="map"></div>
        <div class="datav-map-overlay">
          <label class="datav-form-label" for="geometryType" style="margin-bottom:0;white-space:nowrap;">几何类型</label>
          <select id="geometryType" class="datav-select" style="width:auto;">
            <option value="Point">Point</option>
            <option value="LineString">LineString</option>
            <option value="Polygon">Polygon</option>
            <option value="Circle">Circle</option>
            <option value="None">None</option>
          </select>
        </div>
      </div>

      <aside class="datav-panel">
        <div class="datav-card">
          <div class="datav-card-title">操作说明</div>
          <div class="datav-card-body">
            <p style="color:var(--text-helper);font-size:12px;margin-bottom:4px;">选择几何类型后在地图上绘制</p>
            <p style="color:var(--text-helper);font-size:12px;margin-bottom:4px;">Point — 单击放置点</p>
            <p style="color:var(--text-helper);font-size:12px;margin-bottom:4px;">LineString — 单击添加折点，双击结束</p>
            <p style="color:var(--text-helper);font-size:12px;margin-bottom:4px;">Polygon — 单击添加顶点，双击闭合</p>
            <p style="color:var(--text-helper);font-size:12px;">Circle — 单击确定圆心，拖动确定半径</p>
          </div>
        </div>
      </aside>
    </div>

    <footer class="datav-footer">
      数据来源：OpenLayers 矢量绘制 · 底图：高德地图
    </footer>
  </div>
</body>
<script>
  const layers = [
    new ol.layer.Tile({
      source: new ol.source.XYZ({
        url: 'https://webrd0{1-4}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',
      })
    })
  ];
  const source = new ol.source.Vector({ wrapX: false });
  const vectorLayer = new ol.layer.Vector({
    source: source,
  });
  const view = new ol.View({
    center: ol.proj.transform([116.400146, 40.250184], 'EPSG:4326', 'EPSG:3857'),
    zoom: 9,
  });
  const map = new ol.Map({
    target: 'map',
    layers: layers,
    view: view,
  });
  map.addLayer(vectorLayer);
  const typeSelect = document.getElementById('geometryType');
  let draw = null;
  let snap = null;
  function addInteraction() {
    const value = typeSelect.value;
    if (value !== 'None') {
      draw = new ol.interaction.Draw({
        source: source,
        type: value,
      });
      map.addInteraction(draw);
      snap = new ol.interaction.Snap({
        source: source
      });
      map.addInteraction(snap);
    }
  }
  typeSelect.onchange = function () {
    if (draw) map.removeInteraction(draw);
    if (snap) map.removeInteraction(snap);
    draw = null;
    snap = null;
    addInteraction();
  };
  addInteraction();
</script>

</html>
