<!DOCTYPE html>
<html lang="en">


<head>
  <meta charset="UTF-8">
  <title>openlayer绘制要素</title>
  <link href="ol/ol.css" rel="stylesheet" />
  <script src="ol/ol.js"></script>
  <style type="text/css">
    #map,
    html,
    body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
    }

    form.form-inline {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      padding: 12px 16px;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      font-family: "Microsoft YaHei", sans-serif;
      font-size: 14px;
    }

    form.form-inline select {
      margin-left: 8px;
      padding: 4px 8px;
      font-size: 14px;
      border: 1px solid #c0c0c0;
      border-radius: 3px;
    }
  </style>


</head>

<body>
  <div id="map"></div>
  <form class="form-inline">
    <label>几何类型</label>
    <select id="geometryType" class="form-control">
      <option value="Point">Point</option>
      <option value="LineString">LineString</option>
      <option value="Polygon">Polygon</option>
      <option value="Circle">Circle</option>
      <option value="None">None</option>
    </select>
  </form>
</body>
<script>
  const layers = [
    new ol.layer.Tile({
      source: new ol.source.XYZ({
        url: 'https://rt{0-3}.map.gtimg.com/realtimerender?z={z}&x={x}&y={-y}&type=vector&style=0',
      })
    })
  ];
  const source = new ol.source.Vector({ wrapX: false });
  const vectorLayer = new ol.layer.Vector({
    source: source,
  });
  const view = new ol.View({
    center: ol.proj.transform([116.400146, 40.250184], 'EPSG:4326', 'EPSG:3857'),
    zoom: 9,
  });
  const map = new ol.Map({
    target: 'map',
    layers: layers,
    view: view,
  });
  map.addLayer(vectorLayer);
  const typeSelect = document.getElementById('geometryType');
  let draw = null;
  let snap = null;
  function addInteraction() {
    const value = typeSelect.value;
    if (value !== 'None') {
      draw = new ol.interaction.Draw({
        source: source,
        type: value,
      });
      map.addInteraction(draw);
      snap = new ol.interaction.Snap({
        source: source
      });
      map.addInteraction(snap);
    }
  }
  typeSelect.onchange = function () {
    if (draw) map.removeInteraction(draw);
    if (snap) map.removeInteraction(snap);
    draw = null;
    snap = null;
    addInteraction();
  };
  addInteraction();

</script>

</html>
